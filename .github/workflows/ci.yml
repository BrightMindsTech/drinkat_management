name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate

      - name: Verify Prisma runtime selection
        run: npm run verify:prisma

      - name: Verify Prisma Worker guardrails
        run: npm run verify:prisma-guardrails

      - name: Verify middleware API coverage
        run: npm run verify:middleware
